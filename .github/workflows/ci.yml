name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cover the declared engines floor (>=20.10), current LTS, and latest.
        node: ['20.x', '22.x', '24.x']
    env:
      MOXXY_FIXTURES: replay

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Restore Turborepo's local cache so unchanged packages aren't rebuilt
      # or retested across runs. The cache is content-addressed, so restoring a
      # superset is always safe — turbo only reuses entries whose hash matches.
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ matrix.node }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ matrix.node }}-

      # Use the root scripts (turbo run …) rather than `pnpm -r` so CI gets
      # turbo's graph-aware ordering AND caching — the whole repo is built
      # around it; `pnpm -r` ignored the cache entirely.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Dependency invariants
        run: pnpm check:deps

      - name: Smoke — CLI help loads
        run: node packages/cli/dist/bin.js --help

      - name: Smoke — marketplace list (no API calls)
        run: node packages/cli/dist/bin.js marketplace list

  dep-cruise-graph:
    name: Generate dependency graph
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Render graph
        run: |
          mkdir -p .artifacts
          pnpm exec depcruise --config .dependency-cruiser.cjs --output-type dot packages \
            > .artifacts/graph.dot || true

      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-graph
          path: .artifacts/graph.dot
          if-no-files-found: ignore
