packages:
  - 'packages/*'
  - 'apps/*'
  - 'tooling/*'

# Centralized dependency versions. Packages reference these with
# "<dep>": "catalog:" so the version is defined once here. pnpm rewrites
# catalog: to the concrete version at publish time.
catalog:
  '@clack/prompts': ^1.4.0
  '@types/node': ^22.10.0
  '@types/react': ^18.3.0
  ink: ^5.0.0
  react: ^18.3.0
  tsup: ^8.0.0
  tsx: ^4.19.2
  typescript: ^5.7.3
  vitest: ^2.1.8
  zod: ^3.24.0
